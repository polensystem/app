<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Supabase — Polen</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0c1a; color: #f0ecff; font-family: system-ui, sans-serif; padding: 2rem; min-height: 100vh; }
  h1 { font-size: 1.4rem; margin-bottom: 0.3rem; }
  .sub { color: #7a7099; font-size: 0.82rem; margin-bottom: 2rem; }

  .status-box {
    background: #1a1630; border: 1px solid #2a2445;
    border-radius: 10px; padding: 1rem 1.2rem;
    font-size: 0.82rem; margin-bottom: 1.5rem;
    min-height: 44px; display: flex; align-items: center; gap: 0.7rem;
    flex-wrap: wrap;
  }
  .status-box.ok    { border-color: #5aaa3566; color: #5aaa35; }
  .status-box.error { border-color: #ff5c7266; color: #ff5c72; }
  .status-box.info  { border-color: #3b9edd66; color: #3b9edd; }

  .card {
    background: #1a1630; border: 1px solid #2a2445;
    border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;
  }
  .card h2 { font-size: 1rem; margin-bottom: 1rem; color: #b8b0d8; }

  label { font-size: 0.78rem; color: #7a7099; display: block; margin-bottom: 0.3rem; margin-top: 0.8rem; }
  input[type=text], input[type=file] {
    width: 100%; background: #0f0c1a; border: 1px solid #2a2445;
    border-radius: 8px; padding: 0.6rem 0.8rem; color: #f0ecff;
    font-size: 0.85rem; outline: none;
  }
  input[type=text]:focus { border-color: #b06aff; }

  .btn {
    padding: 0.6rem 1.3rem; border-radius: 8px; font-size: 0.85rem;
    font-weight: 600; cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-primary { background: #7f5af0; color: #fff; margin-top: 1rem; }
  .btn-primary:hover { background: #9b75ff; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.75rem; border-radius: 6px; }
  .btn-test { background: #1e3a5f; color: #3b9edd; border: 1px solid #3b9edd44; }
  .btn-test:hover { background: #254878; }
  .btn-delete { background: #3a1a1a; color: #ff5c72; border: 1px solid #ff5c7244; }
  .btn-delete:hover { background: #4a2222; }

  .members-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
  }
  .member-card {
    background: #0f0c1a; border: 1px solid #2a2445;
    border-radius: 10px; padding: 1rem; text-align: center;
  }
  .member-photo {
    width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
    margin: 0 auto 0.6rem; display: block;
    border: 2px solid #2a2445; background: #2a2445;
  }
  .member-initials {
    width: 64px; height: 64px; border-radius: 50%;
    margin: 0 auto 0.6rem; display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 700; background: #2a2445; color: #b06aff;
  }
  .member-name { font-size: 0.88rem; font-weight: 600; margin-bottom: 0.6rem; }

  .raw-box {
    background: #0f0c1a; border: 1px solid #2a2445;
    border-radius: 8px; padding: 0.8rem; font-size: 0.72rem; color: #7a7099;
    font-family: monospace; max-height: 200px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-all; margin-top: 0.8rem;
  }

  .flex-gap { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
  .count-badge {
    background: #2a2445; border-radius: 99px; padding: 0.2rem 0.7rem;
    font-size: 0.75rem; color: #b8b0d8;
  }
</style>
</head>
<body>

<h1>🧪 Test Supabase — Polen</h1>
<div class="sub">Prueba de conexión, lectura y escritura en tiempo real</div>

<!-- Status -->
<div class="status-box info" id="status-box">⏳ Iniciando conexión con Supabase…</div>

<!-- Actions -->
<div class="flex-gap">
  <button class="btn btn-sm btn-test" onclick="testConnection()">🔌 Test conexión</button>
  <button class="btn btn-sm btn-test" onclick="loadData()">🔄 Recargar datos</button>
  <button class="btn btn-sm btn-delete" onclick="clearAllMembers()">🗑️ Borrar todos</button>
</div>

<!-- Add member form -->
<div class="card">
  <h2>➕ Agregar miembro</h2>
  <label>Nombre</label>
  <input type="text" id="member-name" placeholder="Ej: Jesús García">
  <label>Foto (opcional)</label>
  <input type="file" id="member-photo" accept="image/*">
  <br>
  <button class="btn btn-primary" id="save-btn" onclick="addMember()">Guardar miembro</button>
</div>

<!-- Members list -->
<div class="card">
  <h2 id="members-title">👥 Miembros <span class="count-badge" id="count-badge">0</span></h2>
  <div class="members-grid" id="members-grid">
    <div style="color:#7a7099;font-size:0.82rem">Cargando…</div>
  </div>
</div>

<!-- Raw data -->
<div class="card">
  <h2>📦 Datos crudos de Supabase</h2>
  <button class="btn btn-sm btn-test" onclick="showRaw()">Ver JSON completo</button>
  <div class="raw-box" id="raw-box">Haz clic en "Ver JSON completo"</div>
</div>

<script>
const { createClient } = supabase;

const SUPA_URL = 'https://abfgnaavzqvfhmyyfvpn.supabase.co';
const SUPA_KEY = 'sb_publishable_KO-VfFgz6IyXKVtjPSR2ug_yJAkTU6M';
const RECORD_ID = 'polen-team-data';

const sb = createClient(SUPA_URL, SUPA_KEY);

let appData = { members: [] };

// ── Helpers ──────────────────────────────────────────────
function setStatus(msg, type = 'info') {
  const el = document.getElementById('status-box');
  el.textContent = msg;
  el.className = 'status-box ' + type;
}

function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── Supabase ──────────────────────────────────────────────
async function loadData() {
  setStatus('⏳ Cargando desde Supabase…', 'info');
  try {
    const { data, error } = await sb
      .from('polen_shared')
      .select('data')
      .eq('id', RECORD_ID)
      .single();

    if (error && error.code !== 'PGRST116') {
      setStatus('❌ Error al leer: ' + error.message + ' (code: ' + error.code + ')', 'error');
      console.error(error);
      return;
    }

    if (!data || !data.data) {
      setStatus('⚠️ Registro no encontrado. Se creará uno nuevo al guardar.', 'info');
      appData = { members: [] };
    } else {
      appData = data.data;
      if (!appData.members) appData.members = [];
      setStatus('✅ Datos cargados. ' + appData.members.length + ' miembro(s) encontrado(s).', 'ok');
    }
    renderMembers();
  } catch (e) {
    setStatus('❌ Excepción: ' + (e.message || String(e)), 'error');
    console.error(e);
  }
}

async function saveData() {
  const { error } = await sb
    .from('polen_shared')
    .upsert(
      { id: RECORD_ID, data: appData, updated_at: new Date().toISOString() },
      { onConflict: 'id' }
    );

  if (error) {
    setStatus('❌ Error al guardar: ' + error.message + ' | hint: ' + (error.hint || '—') + ' | code: ' + error.code, 'error');
    console.error('Upsert error:', error);
    return false;
  }
  return true;
}

async function testConnection() {
  setStatus('⏳ Testeando conexión…', 'info');
  try {
    const { data, error } = await sb
      .from('polen_shared')
      .select('id, updated_at')
      .eq('id', RECORD_ID)
      .single();

    if (error && error.code !== 'PGRST116') {
      setStatus('❌ Test fallido: ' + error.message + ' (code: ' + error.code + ')', 'error');
      document.getElementById('raw-box').textContent = JSON.stringify(error, null, 2);
      return;
    }

    if (!data) {
      setStatus('⚠️ Conexión OK pero el registro "' + RECORD_ID + '" no existe aún en la tabla.', 'info');
    } else {
      setStatus('✅ Conexión OK — registro encontrado. Última actualización: ' + (data.updated_at || '—'), 'ok');
    }
    document.getElementById('raw-box').textContent = JSON.stringify(data || { message: 'sin registro' }, null, 2);
  } catch (e) {
    setStatus('❌ Excepción de red: ' + (e.message || String(e)), 'error');
    console.error(e);
  }
}

// ── Members ───────────────────────────────────────────────
async function addMember() {
  const nameInput = document.getElementById('member-name');
  const photoInput = document.getElementById('member-photo');
  const saveBtn = document.getElementById('save-btn');

  const name = nameInput.value.trim();
  if (!name) {
    setStatus('⚠️ El nombre es obligatorio.', 'error');
    return;
  }

  saveBtn.disabled = true;
  saveBtn.textContent = 'Guardando…';
  setStatus('⏳ Guardando miembro…', 'info');

  let photo = null;
  if (photoInput.files && photoInput.files[0]) {
    try {
      photo = await fileToBase64(photoInput.files[0]);
    } catch (e) {
      setStatus('⚠️ Error al leer la foto: ' + e.message, 'error');
      saveBtn.disabled = false;
      saveBtn.textContent = 'Guardar miembro';
      return;
    }
  }

  const newMember = { id: uid(), name, photo };
  appData.members.push(newMember);

  const ok = await saveData();

  saveBtn.disabled = false;
  saveBtn.textContent = 'Guardar miembro';

  if (ok) {
    setStatus('✅ Miembro "' + name + '" guardado correctamente.', 'ok');
    nameInput.value = '';
    photoInput.value = '';
    renderMembers();
  } else {
    // Rollback local
    appData.members = appData.members.filter(m => m.id !== newMember.id);
  }
}

async function deleteMember(id) {
  appData.members = appData.members.filter(m => m.id !== id);
  setStatus('⏳ Eliminando…', 'info');
  const ok = await saveData();
  if (ok) {
    setStatus('✅ Miembro eliminado.', 'ok');
    renderMembers();
  }
}

async function clearAllMembers() {
  if (!confirm('¿Borrar TODOS los miembros?')) return;
  appData.members = [];
  const ok = await saveData();
  if (ok) {
    setStatus('✅ Todos los miembros eliminados.', 'ok');
    renderMembers();
  }
}

function renderMembers() {
  const grid = document.getElementById('members-grid');
  const badge = document.getElementById('count-badge');
  const members = appData.members || [];
  badge.textContent = members.length;

  if (!members.length) {
    grid.innerHTML = '<div style="color:#7a7099;font-size:0.82rem;grid-column:1/-1">No hay miembros aún. Agrega el primero arriba.</div>';
    return;
  }

  grid.innerHTML = members.map(m => `
    <div class="member-card">
      ${m.photo
        ? `<img src="${m.photo}" class="member-photo" alt="${m.name}">`
        : `<div class="member-initials">${m.name.charAt(0).toUpperCase()}</div>`
      }
      <div class="member-name">${m.name}</div>
      <button class="btn btn-sm btn-delete" onclick="deleteMember('${m.id}')">Eliminar</button>
    </div>
  `).join('');
}

function showRaw() {
  document.getElementById('raw-box').textContent = JSON.stringify(appData, null, 2);
}

// ── Realtime ──────────────────────────────────────────────
function subscribeRealtime() {
  sb.channel('test_realtime')
    .on('postgres_changes', {
      event: 'UPDATE', schema: 'public', table: 'polen_shared', filter: `id=eq.${RECORD_ID}`
    }, (payload) => {
      if (payload.new?.data) {
        appData = payload.new.data;
        if (!appData.members) appData.members = [];
        renderMembers();
        setStatus('🔄 Datos actualizados en tiempo real (' + appData.members.length + ' miembros).', 'ok');
      }
    })
    .subscribe((status) => {
      console.log('Realtime status:', status);
    });
}

// ── Boot ──────────────────────────────────────────────────
loadData().then(() => subscribeRealtime());
</script>
</body>
</html>
